name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install package dependencies
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Test package
        run: flutter test

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example
        working-directory: example
        run: flutter analyze

      - name: Test example
        working-directory: example
        run: flutter test
