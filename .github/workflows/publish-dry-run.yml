name: Publish Dry Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  pub-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify publishable package
        run: dart pub publish --dry-run
